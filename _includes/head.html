<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1a3157">

  <!-- jekyll-seo-tag handles title, description, og:*, twitter:* -->
  {% seo %}

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/lacewing-logo.svg' | relative_url }}">

  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }} — Blog" href="{{ '/feed.xml' | absolute_url }}">
</head>
